<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Computer tower body -->
  <rect x="10" y="6" width="44" height="52" rx="4" ry="4"
        fill="none" stroke="#cccccc" stroke-width="3"/>
  <!-- Power button -->
  <circle cx="32" cy="16" r="6"
          fill="none" stroke="#88ddaa" stroke-width="2.5"/>
  <line x1="32" y1="11" x2="32" y2="16"
        stroke="#88ddaa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Drive bay 1 -->
  <rect x="16" y="28" width="32" height="6" rx="2" ry="2"
        fill="none" stroke="#aaaaaa" stroke-width="2"/>
  <!-- Drive bay 2 -->
  <rect x="16" y="38" width="32" height="6" rx="2" ry="2"
        fill="none" stroke="#aaaaaa" stroke-width="2"/>
  <!-- Status LED -->
  <circle cx="20" cy="16" r="3" fill="#44aaff"/>
  <!-- Lightning bolt — constant power symbol -->
  <polyline points="36,52 30,44 34,44 28,36"
            fill="none" stroke="#ffdd44" stroke-width="2.5"
            stroke-linejoin="round" stroke-linecap="round"/>
</svg>
