<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Transformer body -->
  <rect x="14" y="30" width="100" height="68" rx="8" ry="8"
        fill="#2a2a3a" stroke="#5588cc" stroke-width="3"/>

  <!-- HV coil (left) -->
  <g stroke="#66aaff" stroke-width="2.5" fill="none">
    <path d="M28,50 Q22,57 28,64 Q34,71 28,78"/>
    <path d="M36,50 Q30,57 36,64 Q42,71 36,78"/>
    <line x1="28" y1="50" x2="36" y2="50"/>
    <line x1="28" y1="78" x2="36" y2="78"/>
    <!-- HV terminal lines -->
    <line x1="32" y1="30" x2="32" y2="50"/>
    <line x1="32" y1="78" x2="32" y2="98"/>
  </g>

  <!-- LV coil (right) -->
  <g stroke="#ffcc44" stroke-width="2.5" fill="none">
    <path d="M92,50 Q86,57 92,64 Q98,71 92,78"/>
    <path d="M100,50 Q94,57 100,64 Q106,71 100,78"/>
    <line x1="92" y1="50" x2="100" y2="50"/>
    <line x1="92" y1="78" x2="100" y2="78"/>
    <!-- LV terminal lines -->
    <line x1="96" y1="30" x2="96" y2="50"/>
    <line x1="96" y1="78" x2="96" y2="98"/>
  </g>

  <!-- Core (center) -->
  <rect x="55" y="38" width="18" height="52" rx="3"
        fill="#445566" stroke="#8899aa" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="32" y="118" text-anchor="middle"
        font-family="sans-serif" font-size="10" fill="#66aaff">HV</text>
  <text x="96" y="118" text-anchor="middle"
        font-family="sans-serif" font-size="10" fill="#ffcc44">LV</text>
</svg>
